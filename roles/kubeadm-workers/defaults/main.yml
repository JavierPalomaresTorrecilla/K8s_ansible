kubeadm_worker_join_token: ""
kubeadm_discovery_token_ca_cert_hash: ""
kubeadm_join_control_plane_endpoint: >-
  {{ kubeadm_control_plane_endpoint
     | default(control_plane_endpoint
     | default(hostvars[groups['kube_control_plane'][0]].control_plane_endpoint | default('')) ) }}
kubeadm_join_extra_args: []
kubeadm_worker_configured_path: /etc/kubernetes/kubelet.conf
