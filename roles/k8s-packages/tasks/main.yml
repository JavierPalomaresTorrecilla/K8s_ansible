- name: Ensure Kubernetes apt keyring directory exists
  ansible.builtin.file:
    path: "{{ kubernetes_keyring_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Download Kubernetes apt repository key
  ansible.builtin.get_url:
    url: "{{ kubernetes_apt_key_url }}"
    dest: "{{ kubernetes_keyring_path }}"
    mode: "0644"

- name: Add Kubernetes apt repository
  ansible.builtin.apt_repository:
    repo: "{{ kubernetes_apt_repo }}"
    state: present
    filename: kubernetes

- name: Build Kubernetes package specification list
  ansible.builtin.set_fact:
    kubernetes_package_specs: "{{ kubernetes_packages | map('regex_replace', '$', '=' + kube_version + kubernetes_package_suffix) | list }}"

- name: Install Kubernetes packages
  ansible.builtin.apt:
    name: "{{ kubernetes_package_specs }}"
    state: "{{ kubernetes_package_state }}"
    update_cache: true
  register: kubernetes_package_result
  notify: Restart kubelet

- name: Hold Kubernetes packages to avoid unintended upgrades
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop: "{{ kubernetes_packages }}"
  when: kubernetes_hold_packages | bool

- name: Ensure kubelet service is enabled
  ansible.builtin.service:
    name: "{{ kubelet_service_name }}"
    enabled: true
    state: started
  when: kubernetes_manage_kubelet_service | bool
