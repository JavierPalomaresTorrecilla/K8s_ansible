- name: Ensure kubeadm configuration directory exists
  ansible.builtin.file:
    path: "{{ kubeadm_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render kubeadm init configuration
  ansible.builtin.template:
    src: kubeadm-config.yaml.j2
    dest: "{{ kubeadm_config_path }}"
    owner: root
    group: root
    mode: "0644"

- name: Initialize the Kubernetes control plane
  ansible.builtin.command: >
    kubeadm init --config {{ kubeadm_config_path }}
    {% if kubeadm_upload_certs %}--upload-certs{% endif %}
    {% if kubeadm_skip_phases %}--skip-phases {{ kubeadm_skip_phases | join(',') }}{% endif %}
  args:
    creates: /etc/kubernetes/admin.conf

- name: Ensure kubeconfig directory exists for root
  ansible.builtin.file:
    path: /root/.kube
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Copy admin.conf to root kubeconfig
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    remote_src: true
    owner: root
    group: root
    mode: "0600"
